<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Easha AI Chat</title>

<style>

body{
  font-family: Arial, sans-serif;
}

/* FLOATING BUTTON */

#chat-toggle{
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: black;
  color: white;
  border: none;
  padding: 14px 18px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 14px;
  z-index: 999;
}

/* CHAT WINDOW */

#chat-window{
  position: fixed;
  bottom: 80px;
  left: 20px;
  width: 340px;
  height: 480px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 999;
}

/* HEADER */

#chat-header{
  padding: 12px 16px;
  background: black;
  color: white;
  font-weight: bold;
}

/* MESSAGES */

#chat-messages{
  flex: 1;
  padding: 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* MESSAGE ROW */

.message{
  display: flex;
  align-items: flex-start;
  gap: 8px;
  max-width: 100%;
}

/* BOT */

.bot{
  justify-content: flex-start;
}

.bot .bubble{
  background: #f1f1f1;
}

/* USER */

.user{
  justify-content: flex-end;
}

.user .bubble{
  background: black;
  color: white;
}

/* BUBBLE */

.bubble{
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 14px;
  max-width: 70%;
}

/* AVATAR */

.avatar{
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: black;
  color: white;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SUGGESTIONS */

#suggested-prompts{
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  border-top: 1px solid #eee;
}

.suggest-btn{
  padding: 6px 10px;
  border-radius: 16px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
  font-size: 12px;
}

/* INPUT AREA */

#chat-input{
  display: flex;
  border-top: 1px solid #eee;
}

#question{
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

#send{
  border: none;
  background: black;
  color: white;
  padding: 0 16px;
  cursor: pointer;
}

</style>
</head>


<body>

<button id="chat-toggle">Chat</button>

<div id="chat-window">

<div id="chat-header">
Ask Easha about her work
</div>

<div id="chat-messages"></div>

<div id="suggested-prompts"></div>

<div id="chat-input">
<input id="question" placeholder="Ask something..." />
<button id="send">Send</button>
</div>

</div>



<script src="script.js"></script>


<script>

/* OVERRIDE addMessage TO FIX ALIGNMENT */

const oldAddMessage = addMessage;

addMessage = async function(text, sender){

  const msg = document.createElement("div");

  msg.className = "message " + (sender === "user" ? "user" : "bot");

  if(sender === "user"){

    msg.innerHTML =
      `<div class="bubble">${text}</div>`;

  } else {

    msg.innerHTML =
      `<div class="avatar">E</div>
       <div class="bubble"></div>`;

    const bubble = msg.querySelector(".bubble");

    let i = 0;

    while(i <= text.length){

      const partial = text.slice(0,i);

      bubble.innerHTML = formatAI(partial);

      await new Promise(r => setTimeout(r,15));

      i++;

    }

  }

  messages.appendChild(msg);

  messages.scrollTop = messages.scrollHeight;

}

</script>

</body>
</html>
