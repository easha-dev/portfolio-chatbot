<!DOCTYPE html>
<html>
<head>
<title>Easha Portfolio Assistant</title>

<style>

body{
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  margin:0;
}

/* Chat window */

#chat-window{
  width:100%;
  height:100vh;
  background:white;
  display:flex;
  flex-direction:column;
  border-radius:14px;
  overflow:hidden;
}

/* Header */

#chat-header{
  padding:14px;
  border-bottom:1px solid #eee;
  font-weight:600;
}

/* Messages */

#chat-messages{
  flex:1;
  padding:14px;
  overflow-y:auto;
  font-size:14px;
}

.message{
  margin-bottom:12px;
}

/* Suggested prompts */

#suggested-prompts{
  padding:8px 10px;
  border-top:1px solid #eee;
}

.suggest-btn{
  margin:4px;
  padding:6px 10px;
  border-radius:8px;
  border:1px solid #ddd;
  background:#f7f7f7;
  cursor:pointer;
  font-size:12px;
}

/* Input area */

#chat-input{
  display:flex;
  border-top:1px solid #eee;
}

#question{
  flex:1;
  border:none;
  padding:12px;
  font-size:14px;
}

#send{
  border:none;
  padding:12px 16px;
  background:black;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="chat-window">

  <div id="chat-header">
    Ask me about my work
  </div>

  <div id="chat-messages"></div>

  <div id="suggested-prompts"></div>

  <div id="chat-input">
    <input id="question" placeholder="Ask something..." />
    <button id="send">Send</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
