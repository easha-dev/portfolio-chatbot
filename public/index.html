<!DOCTYPE html>
<html>
<head>
<title>Easha Portfolio Assistant</title>

<style>

body{
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* Chat bubble */

#chat-toggle{
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: black;
  color: white;
  border: none;
  padding: 14px 18px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 14px;
}

/* Chat window */

#chat-window{
  position: fixed;
  bottom: 80px;
  right: 24px;
  width: 340px;
  height: 460px;
  background: white;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: none;
  flex-direction: column;
}

/* Header */

#chat-header{
  padding: 14px;
  border-bottom: 1px solid #eee;
  font-weight: 600;
}

/* Messages */

#chat-messages{
  flex: 1;
  padding: 14px;
  overflow-y: auto;
  font-size: 14px;
}

.message{
  margin-bottom: 12px;
}

/* Suggested prompts */

#suggested-prompts{
  padding: 8px 10px;
  border-top: 1px solid #eee;
}

.suggest-btn{
  margin: 4px;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: #f7f7f7;
  cursor: pointer;
  font-size: 12px;
}

/* Input area */

#chat-input{
  display: flex;
  border-top: 1px solid #eee;
}

#question{
  flex: 1;
  border: none;
  padding: 12px;
  font-size: 14px;
}

#send{
  border: none;
  padding: 12px 16px;
  background: black;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>

<button id="chat-toggle">💬 Ask Easha</button>

<div id="chat-window">

  <div id="chat-header">
    Ask me about my work
  </div>

  <div id="chat-messages"></div>

  <div id="suggested-prompts"></div>

  <div id="chat-input">
    <input id="question" placeholder="Ask something..." />
    <button id="send">Send</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
