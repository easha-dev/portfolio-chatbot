<!DOCTYPE html>
<html>
<head>

<title>Easha Portfolio Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
  font-family: 'Inter', sans-serif;
}

/* FLOAT BUTTON */

#chat-toggle{
  position: fixed;
  bottom: 24px;
  left: 24px;
  background: black;
  color: white;
  border: none;
  padding: 14px 18px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 14px;
  z-index:9999;
}


/* CHAT WINDOW */

#chat-window{
  position: fixed;
  bottom: 80px;
  left: 24px;
  width: 360px;
  height: 500px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index:9999;
}


/* HEADER */

#chat-header{
  padding:16px;
  border-bottom:1px solid #eee;
  font-weight:600;
}


/* MESSAGES AREA */

#chat-messages{
  flex:1;
  padding:16px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}


/* MESSAGE ROW */

.message{
  display:flex;
  align-items:flex-start;
  gap:10px;
}


/* BOT */

.message.bot{
  justify-content:flex-start;
}


/* USER */

.message.user{
  justify-content:flex-end;
}


/* MESSAGE BUBBLE */

.bubble{
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
  max-width:75%;
  line-height:1.4;
}


/* BOT BUBBLE */

.bot .bubble{
  background:#f4f4f4;
  color:#111;
}


/* USER BUBBLE */

.user .bubble{
  background:black;
  color:white;
}


/* AVATAR */

.avatar{
  width:28px;
  height:28px;
  border-radius:50%;
  background:black;
  color:white;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}


/* PROMPTS */

#suggested-prompts{
  padding:10px;
  border-top:1px solid #eee;
}

.suggest-btn{
  margin:4px;
  padding:6px 10px;
  border-radius:8px;
  border:1px solid #ddd;
  background:#f7f7f7;
  cursor:pointer;
  font-size:12px;
}


/* INPUT */

#chat-input{
  display:flex;
  border-top:1px solid #eee;
}

#question{
  flex:1;
  border:none;
  padding:12px;
  font-size:14px;
}

#send{
  border:none;
  padding:12px 16px;
  background:black;
  color:white;
  cursor:pointer;
}

</style>
</head>


<body>


<button id="chat-toggle">💬 Ask Easha</button>


<div id="chat-window">

<div id="chat-header">
Ask Easha about her work
</div>

<div id="chat-messages"></div>

<div id="suggested-prompts"></div>

<div id="chat-input">
<input id="question" placeholder="Ask something..." />
<button id="send">Send</button>
</div>

</div>


<script src="script.js"></script>

</body>
</html>
