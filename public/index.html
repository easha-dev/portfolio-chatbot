<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Easha Portfolio Assistant</title>

<style>

body{
  margin:0;
  font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  color:#151515;
  background:white;
}

/* CHAT WINDOW */

#chat-window{
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:white;
}


/* HEADER */

#chat-header{
  padding:18px 20px;
  font-size:14px;
  font-weight:500;
  border-bottom:1px solid #eee;
}


/* MESSAGES AREA */

#chat-messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  font-size:14px;
  line-height:1.6;
}


/* MESSAGE ROW */

.message{
  display:flex;
  align-items:flex-end;
  margin-bottom:14px;
}


/* ALIGNMENT */

.bot{
  justify-content:flex-start;
}

.user{
  justify-content:flex-end;
}


/* AVATAR */

.avatar{
  width:28px;
  height:28px;
  border-radius:50%;
  background:#151515;
  color:white;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:8px;
  flex-shrink:0;
}


/* CHAT BUBBLE */

.bubble{
  padding:10px 14px;
  border-radius:14px;
  max-width:75%;
  word-wrap:break-word;
}


/* BOT BUBBLE */

.bot .bubble{
  background:#f5f5f5;
}


/* USER BUBBLE */

.user .bubble{
  background:#151515;
  color:white;
}


/* SUGGESTED PROMPTS */

#suggested-prompts{
  padding:12px 16px;
  border-top:1px solid #eee;
}

.suggest-btn{
  margin:4px;
  padding:7px 12px;
  border-radius:999px;
  border:1px solid #e5e5e5;
  background:white;
  cursor:pointer;
  font-size:12px;
  font-weight:500;
  font-family:"Inter";
  transition:all .15s ease;
}

.suggest-btn:hover{
  background:#f7f7f7;
}


/* INPUT AREA */

#chat-input{
  display:flex;
  border-top:1px solid #eee;
}

#question{
  flex:1;
  border:none;
  padding:14px 16px;
  font-size:14px;
  outline:none;
  font-family:"Inter";
}

#send{
  border:none;
  padding:14px 18px;
  background:#151515;
  color:white;
  cursor:pointer;
  font-size:14px;
  font-weight:500;
  font-family:"Inter";
}

</style>
</head>

<body>

<div id="chat-window">

<div id="chat-header">
Ask Easha about her work
</div>

<div id="chat-messages"></div>

<div id="suggested-prompts"></div>

<div id="chat-input">
<input id="question" placeholder="Ask about Proact, UX process, or AI work…" />
<button id="send">Send</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
